map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

map $http_cf_connecting_ip $harbor_client_ip {
    ""      $remote_addr;
    default $http_cf_connecting_ip;
}

server {
    listen 80;
    server_name _;

    # Backend containers are deliberately stopped during paired backups and
    # restores. Resolve the stable Compose service name through Docker DNS for
    # each TTL window so a restarted container cannot leave Nginx pinned to its
    # previous IP address.
    resolver 127.0.0.11 valid=5s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    client_max_body_size 12m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        set $harbor_market_backend http://backend:8000;
        proxy_pass $harbor_market_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        # cloudflared supplies CF-Connecting-IP; direct loopback/LAN requests
        # fall back to the actual peer address. The backend validates this as
        # one IP before using it for rate-limit isolation.
        proxy_set_header X-Real-IP $harbor_client_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_connect_timeout 5s;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
